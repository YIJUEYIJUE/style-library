<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>风格资产库 · Style Asset Library</title>
<meta name="description" content="由飞书多维表格《风格资产库自用 副本》生成的风格库网页，收录生图风格、MJ 风格、海报排版、自制风格、人物感、品牌产品等参考。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;800&family=Noto+Serif+SC:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- app shell: topbar + left sidebar + right content -->
<section class="library" id="library">
  <header class="topbar">
    <div class="libBrand">
      <div class="brandPill">STYLE·LIB</div>
      <span class="brandSub">风格资产库</span>
    </div>
    <label class="search">
      <span style="font-family:var(--mono);color:var(--ink3)">⌕</span>
      <input id="search" type="text" placeholder="搜索风格名 / 提示词 / 模型 / 备注…" autocomplete="off">
    </label>
    <div class="libActions"><span class="navMeta" id="navMeta">source · 飞书多维表格</span></div>
  </header>

  <aside class="side">
    <p class="sideLabel">分类 CATEGORIES</p>
    <div id="catList"></div>
  </aside>

  <section class="content">
    <div class="contentHead">
      <h2 id="listTitle">全部风格</h2>
      <p id="listSub"></p>
    </div>
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty" style="display:none">没有符合条件的条目，试试放宽筛选条件 🔍</div>
  </section>
</section>

<!-- modal -->
<div class="modal" id="modal">
  <div class="modalCard">
    <button class="close" id="mClose">×</button>
    <div class="modalMedia">
      <div class="gallery">
        <button class="gnav prev" id="gPrev">‹</button>
        <img id="gImg" src="" alt="">
        <button class="gnav next" id="gNext">›</button>
        <span class="gcount" id="gCount"></span>
      </div>
      <div class="thumbs" id="thumbs"></div>
    </div>
    <div class="modalInfo">
      <div class="kicker" id="mCat">CATEGORY</div>
      <h2 id="mTitle">标题</h2>
      <div class="specs" id="mSpecs"></div>
      <div class="promptTitle">
        <span>提示词 / 说明 PROMPT</span>
        <button class="copy" id="mCopy">⧉ 复制</button>
      </div>
      <div class="promptBox" id="mPrompt"></div>
      <div class="notice" id="mNotice"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast">已复制 ✓</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
